query ReactorConversation($id: String!, $loadOptions: ReactorConversationLoadOptions) {
  ReactorConversation(id: $id, loadOptions: $loadOptions) {
    __typename
    ... on ReactorChatState {
      id
      personaId
      created
      updated
      user { id firstName lastName }
      history {
        id
        role
        content
        thinking
        timestamp
        tool_calls { id type function { name arguments } status }
        tool_results { id name content timestamp }
        tool_errors { id name error timestamp }
      }
      vars
      tools {
        id
        type
        propsMap
        roles
        function { name icon description parameters }        
      }
      macros { id nameSpace name version icon description alias roles params runat }
      toolApprovalMode
      modelId
      providerId
      tokenCount
      maxTokens
      tokenPressure
      files { id filename mimetype size path }
      folders { name path }
    }
    ... on ReactorErrorResponse {
      code
      message
      details
      timestamp
      recoverable
      suggestion
    }
  }
}

