mutation ReactorAskQuestionAudio($audio: Upload!, $chatSessionId: String!) {
  ReactorAskQuestionAudio(audio: $audio, chatSessionId: $chatSessionId) {
    __typename
    ... on ReactorChatMessage {
      sessionId
      id
      role
      content
      thinking
      rating
      timestamp
      tool_calls { id type function { name arguments } status }
      tool_results { id name content timestamp }
      tool_errors { id name error timestamp }
    }
    ... on ReactorErrorResponse {
      code
      message
      details
      timestamp
      recoverable
      suggestion
    }
  }
}

