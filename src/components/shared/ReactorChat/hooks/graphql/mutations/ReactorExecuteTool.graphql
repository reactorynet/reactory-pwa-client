mutation ReactorExecuteTool($tool: String!, $personaId: String!, $chatSessionId: String!, $callId: String, $args: Any) {
  ReactorExecuteTool(tool: $tool, personaId: $personaId, chatSessionId: $chatSessionId, callId: $callId, args: $args) {
    __typename
    ... on ReactorChatMessage {
      sessionId
      id
      role
      content
      thinking
      timestamp
      tool_calls { id type function { name arguments } status }
      tool_results { id name content timestamp }
      tool_errors { id name error timestamp }
    }
    ... on ReactorInitiateSSE {
      sessionId
      endpoint
      token
      status
      expiry
      headers
    }
    ... on ReactorErrorResponse {
      code
      message
      details
      timestamp
      recoverable
      suggestion
    }
  }
}

