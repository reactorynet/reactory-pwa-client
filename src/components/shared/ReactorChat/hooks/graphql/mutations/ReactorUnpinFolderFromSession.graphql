mutation ReactorUnpinFolderFromSession($params: ReactorPinFolderParam!) {
  ReactorUnpinFolderFromSession(params: $params) {
    __typename
    ... on ReactorPinFolderResponse {
      success
      message
      sessionId
      path
    }
    ... on ReactorErrorResponse {
      code
      message
      details
      timestamp
      recoverable
      suggestion
    }
  }
}
